# ============================================
# ConviviApp - Docker Compose (Producción)
# ============================================
# Para desarrollo local: docker compose up
# Los overrides de desarrollo se aplican automáticamente
# desde docker-compose.override.yml

services:
  # ==========================================
  # Base de datos PostgreSQL
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: conviviapp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-conviviapp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-conviviapp_dev}
      POSTGRES_DB: ${DB_NAME:-conviviapp}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-conviviapp} -d ${DB_NAME:-conviviapp}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - conviviapp-network

  # ==========================================
  # Redis (caché y colas)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: conviviapp-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - conviviapp-network

  # ==========================================
  # Backend API (Node.js + Express)
  # ==========================================
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: conviviapp-server
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-conviviapp}:${DB_PASSWORD:-conviviapp_dev}@postgres:5432/${DB_NAME:-conviviapp}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - conviviapp-network

  # ==========================================
  # Frontend (React + Nginx)
  # ==========================================
  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: conviviapp-client
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - server
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost/health']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - conviviapp-network

volumes:
  postgres_data:
  redis_data:

networks:
  conviviapp-network:
    driver: bridge
