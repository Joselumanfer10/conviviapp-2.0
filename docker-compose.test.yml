version: '3.8'

services:
  postgres-test:
    image: postgres:15-alpine
    container_name: conviviapp-postgres-test
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: conviviapp_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    command: postgres -c fsync=off -c synchronous_commit=off -c full_page_writes=off
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d conviviapp_test"]
      interval: 5s
      timeout: 5s
      retries: 5
